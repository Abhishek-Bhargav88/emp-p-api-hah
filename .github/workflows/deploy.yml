name: Deploy to CloudHub

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Set up Maven
        uses: stCarolas/setup-maven@v4
        with:
         maven-version: 3.8.8
         
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '8'

      - name: Build and Deploy
        run: mvn clean deploy -DmuleDeploy
        env:
          anypoint.clientId: ${{ secrets.ANYPOINT_CLIENT_ID}}
          anypoint.clientSecret: ${{ secrets.ANYPOINT_CLIENT_SECRET}}
